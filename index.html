<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
                   </dl>

            </article>
 <main class="conteudo">
        <!-- Cabeçalho-->
        <header>
            <h1 class="poppins-bold "> Escolha seu Pokemon </h1>
        </header>
        <!-- Seção com os cards pokemon-->
        <section class="cards-lista">
            <article class="card planta">
                <figure class="avatar-container">
                    <div class="aro-avatar"></div>
                    <img src="img/bulbassauro.png" alt="Bulbassauro imagem em 3D">
                </figure>
                <h2 class="nome-pokemon poppins-bold">Bulbassauro</h2>
                <p class="tipo-pokemon">Planta</p>
                <dl class="lista-estatisticas">

                    <dt class="nome-estatistica">Força</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width:60%"></div>
                    </dd>

                    <dt class="nome-estatistica">Velocidade</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width:70%"></div>
                    </dd>

                    <dt class="nome-estatistica">Peso</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width:45%"></div>
                    </dd>
                <dt class="nome-estatistica">Habilidade</dt>
                <dd class="barra-estatistica">
                    <div class="barra-preenchimento" style="width:75%"></div>
                </dd>
                </dl>

            </article>

            <article class="card agua">
                <figure class="avatar-container">
                    <div class="aro-avatar"></div>
                    <img src="img/squirtle.png" alt="squirtle imagem em 3D">
                </figure>
                <h2 class="nome-pokemon poppins-bold">squirtle</h2>
                <p class="tipo-pokemon">água</p>
                <dl class="lista-estatisticas">

                    <dt class="nome-estatistica">Força</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width:50%"></div>
                    </dd>
               
                <dt class="nome-estatistica">Velocidade</dt>
                <dd class="barra-estatistica">
                    <div class="barra-preenchimento" style="width:80%"></div>
                </dd>
               
                <dt class="nome-estatistica">Peso</dt>
                <dd class="barra-estatistica">
                    <div class="barra-preenchimento" style="width:45%"></div>
                </dd>
                
                <dt class="nome-estatistica">Habilidade</dt>
                <dd class="barra-estatistica">
                    <div class="barra-preenchimento" style="width:79%"></div>
                </dd>
                </dl>

            </article>

            <article class="card fogo">
                <figure class="avatar-container">
                    <div class="aro-avatar"></div>
                    <img src="img/chmander.png" alt="chmander imagem em 3D">
                </figure>
                <h2 class="nome-pokemon poppins-bold"></h2>
                <p class="tipo-pokemon">Fogo</p>
                <dl class="lista-estatisticas">

                    <dt class="nome-estatistica">Força</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width:60%"></div>
                    </dd>
                
                <dt class="nome-estatistica">Velocidade</dt>
                <dd class="barra-estatistica">
                    <div class="barra-preenchimento" style="width: 80%"></div>
                </dd>
               
                <dt class="nome-estatistica">Peso</dt>
                <dd class="barra-estatistica">
                    <div class="barra-preenchimento" style="width:40%"></div>
                </dd>
               
                <dt class="nome-estatistica">Habilidade</dt>
                <dd class="barra-estatistica">
                    <div class="barra-preenchimento" style="width:85%"></div>
                </dd>
                </dl>

            </article>

            <article class="card eletrico">
                <figure class="avatar-container">
                    <div class="aro-avatar"></div>
                    <img src="img/pikachu.png" alt="pikachu imagem em 3D">
                </figure>
                <h2 class="nome-pokemon poppins-bold"></h2>
                <p class="tipo-pokemon">eletrico</p>
                <dl class="lista-estatisticas">

                    <dt class="nome-estatistica">Força</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width:60%"></div>
                    </dd>

                    <dt class="nome-estatistica">Velocidade</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width:70%"></div>
                    </dd>


                    <dt class="nome-estatistica">Peso</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width:45%"></div>
                    </dd>
                    <dt class="nome-estatistica">Habilidade</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width:90%"></div>
                    </dd>

        </section>
    </main>


</body>

</html>
